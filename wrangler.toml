# Cloudflare Workers 설정

name = "groupstages-api"
main = "workers/index.js"
compatibility_date = "2024-01-01"

# D1 데이터베이스 바인딩
[[d1_databases]]
binding = "DB"
database_name = "groupstages"
database_id = "13ee6163-ca10-40cf-8df2-b770146d80f3"

# 환경 변수 (민감하지 않은 정보만)
[vars]
WORLD_CUP_LEAGUE_ID = "1"
WORLD_CUP_SEASON = "2026"

# Cron Triggers
# - "*/5 * * * *"  → fixtures sync (5분 간격, 1 subrequest)
# - "* * * * *"    → card events sync (1분 간격, 경기 중에만 active)
# - "0 */6 * * *"  → ELO sync (6시간, hh:00, 1 subrequest)
# - "30 */6 * * *" → form sync (6시간, hh:30 — 30분 offset, 48 subrequest)
# ELO/form 분리 이유: 무료 티어 50 subrequest/invocation 한도 (49/50 buffer 위험 → 각자 단독 invocation으로 분리)
[triggers]
crons = ["*/5 * * * *", "* * * * *", "0 */6 * * *", "30 */6 * * *"]

# Secrets (Cloudflare Dashboard에서 설정)
# wrangler secret put API_FOOTBALL_KEY
# wrangler secret put SYNC_SECRET
