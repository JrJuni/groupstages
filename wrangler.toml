# Cloudflare Workers 설정

name = "groupstages-api"
main = "workers/index.js"
compatibility_date = "2024-01-01"

# D1 데이터베이스 바인딩
[[d1_databases]]
binding = "DB"
database_name = "groupstages"
database_id = "13ee6163-ca10-40cf-8df2-b770146d80f3"

# 환경 변수 (민감하지 않은 정보만)
[vars]
WORLD_CUP_LEAGUE_ID = "1"
WORLD_CUP_SEASON = "2026"

# Cron Trigger — 매 5분마다 API-Football 동기화
[triggers]
crons = ["*/5 * * * *", "* * * * *"]

# Secrets (Cloudflare Dashboard에서 설정)
# wrangler secret put API_FOOTBALL_KEY
# wrangler secret put SYNC_SECRET
